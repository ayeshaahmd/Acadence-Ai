<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark/Premium modern background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <!-- Main brand gradient: Royal Blue to Indigo/Purple -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <!-- Secondary soft accent glow -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <!-- Drop shadow filter for 3D depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Circular container with soft glowing border -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="url(#brandGrad)" stroke-width="8" />
  
  <!-- Subtle inner decorative accent ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#accentGrad)" stroke-dasharray="10 15" stroke-width="2" opacity="0.3" />

  <!-- Logo Mark (Integrated Graduation Cap + Open Book) -->
  <g filter="url(#glow)" transform="translate(0, 0)">
    <!-- The Open Book (Base structure) -->
    <!-- Left Page -->
    <path d="M 246 360 C 190 340, 140 350, 100 370 L 100 240 C 140 220, 190 210, 246 230 Z" fill="url(#brandGrad)" opacity="0.85" />
    <!-- Right Page -->
    <path d="M 266 360 C 322 340, 372 350, 412 370 L 412 240 C 372 220, 322 210, 266 230 Z" fill="url(#brandGrad)" opacity="0.85" />
    <!-- Book Spine/Center Light -->
    <line x1="256" y1="220" x2="256" y2="370" stroke="#f8fafc" stroke-width="4" stroke-linecap="round" opacity="0.9" />

    <!-- The Graduation Cap (Superimposed at the top) -->
    <!-- Cap Diamond Top -->
    <polygon points="256,110 390,160 256,210 122,160" fill="url(#accentGrad)" />
    <!-- White border accent for top cap -->
    <polygon points="256,110 390,160 256,210 122,160" fill="none" stroke="#f8fafc" stroke-width="3" opacity="0.8" />
    
    <!-- Cap Skull/Base under the diamond -->
    <path d="M 180 185 L 180 230 C 180 260, 332 260, 332 230 L 332 185" fill="none" stroke="url(#accentGrad)" stroke-width="8" stroke-linecap="round" />
    
    <!-- Tassel -->
    <path d="M 256 160 L 140 180 L 130 250" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <circle cx="130" cy="254" r="6" fill="#fbbf24" />
  </g>
  
  <!-- Star on top of cap to signify ultimate quality and scholarly achievement -->
  <path d="M 256 60 L 270 95 L 305 95 L 277 115 L 288 150 L 256 130 L 224 150 L 235 115 L 207 95 L 242 95 Z" fill="#fbbf24" opacity="0.95" />
</svg>
